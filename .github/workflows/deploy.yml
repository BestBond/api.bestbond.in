name: Deploy Admin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Admin to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /var/www/reward-system-admin

            git pull origin main

            npm install

            npm run build

            pm2 restart bestbond-admin

            pm2 save
